<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leitor de QR Code</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 20px 16px 40px;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #111;
      color: #fff;
    }

    .container {
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
    }

    .logo {
      width: 180px;
      margin: 10px auto 20px;
      display: block;
    }

    h2 {
      margin: 10px 0 10px;
      font-size: 28px;
    }

    .subtitle {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      min-height: 50px;
      padding: 14px;
      margin: 8px 0;
      border: none;
      background: #000;
      color: white;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    #reader {
      width: 100%;
      margin-top: 20px;
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
    }

    .info-box {
      margin-top: 16px;
      font-size: 16px;
      font-weight: bold;
    }

    #popup, #formulario {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 9999;
      padding: 20px;
    }

    .popup-content, .form-content {
      background: white;
      color: #111;
      padding: 20px;
      margin: 60px auto;
      width: 100%;
      max-width: 400px;
      border-radius: 15px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    .secondary-btn {
      background: #777;
    }

    .message {
      margin-top: 12px;
      font-size: 14px;
    }

  </style>
</head>

<body>

<div class="container">

  <img class="logo" src="https://acdn-us.mitiendanube.com/stores/006/376/572/themes/common/logo-1519015875-1750439417-b6b8db548d14ee965e07d28984221b291750439417-480-0.webp">

  <h2>Leitor de QR Code</h2>
  <div class="subtitle">Leia os QR codes e finalize seu cadastro</div>

  <button onclick="startScanner()">Abrir câmera</button>

  <div id="reader"></div>

  <div class="info-box">
    QR Codes lidos: <span id="contador">0</span>
  </div>

</div>

<!-- POPUP -->
<div id="popup">
  <div class="popup-content">
    <p>QR Code registrado!</p>
    <button onclick="continuar()">Ler outro</button>
    <button class="secondary-btn" onclick="finalizar()">Finalizar</button>
  </div>
</div>

<!-- FORM -->
<div id="formulario">
  <div class="form-content">
    <h3>Seus dados</h3>
    <input type="text" id="nome" placeholder="Nome completo">
    <input type="email" id="email" placeholder="Email">
    <button onclick="enviar()">Enviar</button>
    <div id="mensagem" class="message"></div>
  </div>
</div>

<script>

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwJ48q4XUHFXXAvdZYG6N-cza0eYPNvhdRbRV2uiWFcQviSB-6lBYxyCaEnT0nNYYj6/exec";

let qrCodes = [];
let scanner;

function atualizarContador() {
  document.getElementById("contador").innerText = qrCodes.length;
}

function startScanner() {
  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (qrCodeMessage) => {

      if (!qrCodes.includes(qrCodeMessage)) {
        qrCodes.push(qrCodeMessage);
        atualizarContador();

        scanner.stop().then(() => {
          document.getElementById("popup").style.display = "block";
        });
      }

    }
  ).catch(() => {
    alert("Erro ao abrir câmera");
  });
}

function continuar() {
  document.getElementById("popup").style.display = "none";
  startScanner();
}

function finalizar() {
  document.getElementById("popup").style.display = "none";
  document.getElementById("formulario").style.display = "block";
}

async function enviar() {

  const nome = document.getElementById("nome").value.trim();
  const email = document.getElementById("email").value.trim();
  const mensagem = document.getElementById("mensagem");

  mensagem.innerText = "";

  if (!nome || !email) {
    mensagem.innerText = "Preencha nome e email.";
    return;
  }

  try {

    const response = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify({
        nome: nome,
        email: email,
        total_qr_codes: qrCodes.length,
        lista_qr_codes: qrCodes
      })
    });

    const text = await response.text();
    console.log("Resposta:", text);

    mensagem.innerText = "Enviado com sucesso!";
    alert("Enviado com sucesso!");
    location.reload();

  } catch (error) {
    console.error(error);
    mensagem.innerText = "Erro ao enviar.";
    alert("Erro ao enviar.");
  }
}

</script>

</body>
</html>
