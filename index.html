<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Leitor de QR Code</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f5f5f5;
}

#reader {
    width: 300px;
    margin: 20px auto;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    background: black;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

#popup, #formulario {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.7);
}

.popup-content, .form-content {
    background: white;
    padding: 20px;
    margin: 100px auto;
    width: 300px;
    border-radius: 10px;
}

input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
}
</style>
</head>

<body>

<h2>Leitor de QR Code</h2>

<button onclick="startScanner()">Abrir câmera</button>

<div id="reader"></div>

<!-- POPUP -->
<div id="popup">
  <div class="popup-content">
    <p>QR Code registrado!</p>
    <button onclick="continuar()">Ler outro</button>
    <button onclick="finalizar()">Finalizar</button>
  </div>
</div>

<!-- FORMULÁRIO -->
<div id="formulario">
  <div class="form-content">
    <h3>Seus dados</h3>
    <input type="text" id="nome" placeholder="Nome completo">
    <input type="email" id="email" placeholder="Email">
    <button onclick="enviar()">Enviar</button>
  </div>
</div>

<script>

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzyRh68CLigX7IoVVs60cBaxnCJ6fPItltkwi4ZbmVR1sGGKbliNeO4UkzJbB8KhwZn/exec";

let qrCodes = [];
let scanner;

function startScanner() {
    scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: 250
        },
        qrCodeMessage => {

            if (!qrCodes.includes(qrCodeMessage)) {
                qrCodes.push(qrCodeMessage);
                scanner.stop();
                document.getElementById("popup").style.display = "block";
            }

        }
    );
}

function continuar() {
    document.getElementById("popup").style.display = "none";
    startScanner();
}

function finalizar() {
    document.getElementById("popup").style.display = "none";
    document.getElementById("formulario").style.display = "block";
}

function enviar() {

    const nome = document.getElementById("nome").value;
    const email = document.getElementById("email").value;

    fetch(APPS_SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
            nome: nome,
            email: email,
            total_qr_codes: qrCodes.length,
            lista_qr_codes: qrCodes
        })
    })
    .then(res => res.json())
    .then(res => {
        alert("Enviado com sucesso!");
        location.reload();
    })
    .catch(err => {
        alert("Erro ao enviar.");
    });
}

</script>

</body>
</html>
