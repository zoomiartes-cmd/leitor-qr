<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor Qr Code</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  padding: 20px;
  font-family: Arial, sans-serif;
  text-align: center;
  background: #000;
  color: #fff;
}

.container {
  max-width: 480px;
  margin: auto;
}

.logo img {
  width: 180px;
  margin-bottom: 20px;
}

button {
  width: 100%;
  padding: 14px;
  margin: 8px 0;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: #fff;
  color: #000;
  font-weight: bold;
}

#reader {
  width: 100%;
  margin-top: 20px;
  display: none;
}

.info {
  margin-top: 10px;
  font-size: 16px;
}

.popup, .form {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.box {
  background: #fff;
  color: #000;
  padding: 20px;
  border-radius: 12px;
  width: 100%;
  max-width: 350px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

.secondary {
  background: #777;
  color: #fff;
}

.message {
  margin-top: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <img src="https://acdn-us.mitiendanube.com/stores/006/376/572/themes/common/logo-1519015875-1750439417-b6b8db548d14ee965e07d28984221b291750439417-480-0.webp">
  </div>
  
<p class="texto-instrucao">
  Faça a leitura do Qr code interno que se encontra dentro da embalagem da Chefe.
</p>
  
  <h2>Leitor de Qr Code</h2>

  <button onclick="startCamera()">Abrir câmera</button>

  <div id="reader"></div>

  <div class="info">
  QR codes lidos: <span id="contador">0</span>
</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="box">
    <h3 style="font-size: 14px; font-style: italic; font-weight: 300;">
  QR CODE REGISTRADO
</h3>
    <button onclick="scanAgain()">Ler outro</button>
    <button class="secondary" onclick="finish()">Enviar</button>
  </div>
</div>

<!-- FORM -->
<div class="form" id="form">
  <div class="box">
    <h3>Preencha os dados</h3>
    <input type="text" id="nome" placeholder="Nome completo">
    <input type="email" id="email" placeholder="Email">
    <button onclick="send()">Enviar</button>
    <div id="msg" class="message"></div>
  </div>
</div>

<script>

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyx50--4dxlPwnWLCokZmzYdPPzaHR4oAgH9QW4hsCxrzdqz9Jl56Y6S6DhUcehs8co/exec";

let scanner;
let codes = [];

function updateCount() {
  document.getElementById("contador").innerText = codes.length;
}

function startCamera() {
  document.getElementById("reader").style.display = "block";

  scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (text) => {
      if (!codes.includes(text)) {
        codes.push(text);
        updateCount();

        scanner.stop().then(() => {
          document.getElementById("popup").style.display = "flex";
        });
      }
    }
  ).catch(() => {
    alert("Erro ao abrir câmera");
  });
}

function scanAgain() {
  document.getElementById("popup").style.display = "none";
  startCamera();
}

function finish() {
  document.getElementById("popup").style.display = "none";
  document.getElementById("reader").style.display = "none";
  document.getElementById("form").style.display = "flex";
}

async function send() {

  const nome = document.getElementById("nome").value.trim();
  const email = document.getElementById("email").value.trim();
  const msg = document.getElementById("msg");

  msg.innerText = "";

  if (!nome || !email) {
    msg.innerText = "Preencha todos os campos";
    return;
  }

  try {

    const response = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        nome,
        email,
        total_qr_codes: codes.length,
        lista_qr_codes: codes
      })
    });

    const text = await response.text();
    console.log("Resposta:", text);

    let result;
    try {
      result = JSON.parse(text);
    } catch {
      throw new Error("Resposta inválida do servidor");
    }

    if (result.success) {
      msg.innerText = "Enviado com sucesso!";
      alert("Enviado com sucesso!");
      location.reload();
    } else {
      throw new Error(result.error || "Erro ao salvar");
    }

  } catch (err) {
    console.error(err);
    msg.innerText = "Erro: " + err.message;
    alert("Erro ao enviar: " + err.message);
  }
}

</script>

</body>
</html>
